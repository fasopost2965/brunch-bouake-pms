# ============================================
# Brunch Bouaké PMS — Docker Compose
# ============================================
# MySQL 8.0 + Adminer (DB admin UI)
# Usage: docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: brunch-bouake-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-brunch_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-brunch_bouake_pms}
      MYSQL_USER: ${MYSQL_USER:-brunch_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-brunch_pass_2026}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: brunch-bouake-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
